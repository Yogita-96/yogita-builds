# Gitleaks config — tuned to avoid false positives on placeholder/example strings
# while still catching real committed secrets.

title = "yogita-builds gitleaks config"

[extend]
useDefault = true

# Custom rules for key formats not reliably caught by gitleaks' default ruleset
[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-(api03|admin01)-[A-Za-z0-9_-]{20,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{20,}T3BlbkFJ[A-Za-z0-9]{20,}|sk-proj-[A-Za-z0-9_-]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key/secret assigned to a long string literal"
regex = '''(?i)(api[_-]?key|secret[_-]?key|access[_-]?token)['"]?\s*[:=]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
tags = ["key", "generic"]

[allowlist]
description = "Ignore known-safe placeholder patterns"
regexes = [
  '''sk-ant-\.\.\.''',            # UI placeholder text, not a real key
  '''YOUR_API_KEY''',
  '''example\.com''',
]
paths = [
  '''node_modules''',
  '''dist''',
  '''build''',
  '''\.min\.js''',
  '''package-lock\.json''',
]